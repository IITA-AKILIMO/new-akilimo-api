name: "akilimo-new"

services:
    api:
        image: iita/akilimo-api:${AKILIMO_TAG:-latest}
        container_name: api
        restart: unless-stopped
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env
        environment:
            # App
            - APP_NAME=${APP_NAME:-Akilimo}
            - APP_ENV=${APP_ENV:-production}
            - APP_KEY=${APP_KEY}
            - APP_DEBUG=${APP_DEBUG:-false}
            - APP_URL=${APP_URL:-http://localhost}
            - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
            - LOG_CHANNEL=${LOG_CHANNEL:-stack}
            - LOG_LEVEL=${LOG_LEVEL:-error}
            # Database
            - DB_CONNECTION=${DB_CONNECTION:-mariadb}
            - DB_HOST=${DB_HOST:-mariadb}
            - DB_PORT=${DB_PORT:-3306}
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
            # Cache / Redis
            - CACHE_STORE=${CACHE_STORE:-redis}
            - CACHE_TTL=${CACHE_TTL:-1h}
            - REDIS_CLIENT=${REDIS_CLIENT:-phpredis}
            - REDIS_HOST=${REDIS_HOST:-redis}
            - REDIS_PORT=${REDIS_PORT:-6379}
            - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
            # Queue
            - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
            - QUEUE_WORKERS=${QUEUE_WORKERS:-2}
            - QUEUE_MAX_TRIES=${QUEUE_MAX_TRIES:-3}
            - QUEUE_TIMEOUT=${QUEUE_TIMEOUT:-3600}
            - QUEUE_SLEEP=${QUEUE_SLEEP:-3}
            # Auth
            - AUTH_TOKEN_TTL_DAYS=${AUTH_TOKEN_TTL_DAYS:-30}
            - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
            # Akilimo Compute service
            - AKILIMO_COMPUTE_BASE_URL=${AKILIMO_COMPUTE_BASE_URL}
            - AKILIMO_COMPUTE_ENDPOINT=${AKILIMO_COMPUTE_ENDPOINT:-/compute}
            - AKILIMO_COMPUTE_TIMEOUT=${AKILIMO_COMPUTE_TIMEOUT:-120}
            - AKILIMO_COMPUTE_RETRIES=${AKILIMO_COMPUTE_RETRIES:-3}
            - AKILIMO_COMPUTE_LOGGING=${AKILIMO_COMPUTE_LOGGING:-true}
            # PHP-FPM tuning
            - PHP_FPM_PM_MAX_CHILDREN=${PHP_FPM_PM_MAX_CHILDREN:-10}
            - PHP_FPM_PM_START_SERVERS=${PHP_FPM_PM_START_SERVERS:-2}
            - PHP_FPM_PM_MIN_SPARE_SERVERS=${PHP_FPM_PM_MIN_SPARE_SERVERS:-1}
            - PHP_FPM_PM_MAX_SPARE_SERVERS=${PHP_FPM_PM_MAX_SPARE_SERVERS:-3}
        ports:
            - "9000:80"

