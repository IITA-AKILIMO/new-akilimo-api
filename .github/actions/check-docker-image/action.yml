name: Check Docker Image
description: Check if a Docker Hub image tag exists (unauthenticated, public repos)

inputs:
  image_name:
    required: true
    description: Docker image name (e.g. iita/akilimo-api)
  tag:
    required: true
    description: Docker image tag to check

outputs:
  exists:
    description: Whether the image tag exists
    value: ${{ steps.check.outputs.exists }}

runs:
  using: composite
  steps:
    - id: check
      shell: bash
      run: |
        REPO_NAME=$(echo "${{ inputs.image_name }}" | cut -d'/' -f2)
        USERNAME=$(echo "${{ inputs.image_name }}" | cut -d'/' -f1)
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
          "https://hub.docker.com/v2/repositories/$USERNAME/$REPO_NAME/tags/${{ inputs.tag }}")
        if [ "$HTTP_CODE" == "200" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
