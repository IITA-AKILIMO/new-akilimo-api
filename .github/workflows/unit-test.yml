name: UnitTests

on:
  push:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: unit-test-${{ github.repository_owner }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  APP_ENV: testing
  APP_KEY: base64:Ny2n0WddJ9K1bJPlK4CkS5I0Wj9BbytcVYdRmqNP/5I=

jobs:
  setup:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP and install dependencies
        uses: ./.github/actions/php-setup

      - name: Build frontend assets
        uses: ./.github/actions/node-build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            vendor/
            public/build/
          retention-days: 1

  test-unit:
    needs: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: ./.github/actions/php-setup
        with:
          install-deps: 'false'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts

      - name: Run Unit Tests
        run: composer test:unit

  test-feature:
    needs: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      mariadb:
        image: mariadb:11.2
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: akilimo_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: akilimo_test
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: ./.github/actions/php-setup
        with:
          install-deps: 'false'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts

      - name: Install MariaDB client
        run: sudo apt-get install -y mariadb-client

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Run database migrations
        run: php artisan migrate --step

      - name: Run Feature Tests
        run: composer test:feature
