name: "Sonar checks"

on:
  workflow_dispatch:
  merge_group:
  push:
    branches:
      - develop

jobs:
  sonar-checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      cancel-in-progress: true
      group: sonar-checks-${{ github.ref }}

    services:
      mariadb:
        image: mariadb:11.2
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: akilimo_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      APP_KEY: base64:Ny2n0WddJ9K1bJPlK4CkS5I0Wj9BbytcVYdRmqNP/5I=
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: akilimo_test
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up PHP and install dependencies
        uses: ./.github/actions/php-setup
        with:
          coverage: xdebug

      - name: Build frontend assets
        uses: ./.github/actions/node-build

      - name: Install MariaDB client
        run: sudo apt-get install -y mariadb-client

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Run database migrations
        run: php artisan migrate --no-interaction --force

      - name: Run PEST tests with coverage
        env:
          XDEBUG_MODE: coverage
        run: composer pest:coverage-xml

      - name: sonar checks
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: sonar gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
